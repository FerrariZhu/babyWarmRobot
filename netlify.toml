# Next.js app lives in warmrobot/web (npm workspaces monorepo).
# Install deps from warmrobot/, build the web workspace, deploy via OpenNext runtime.
[build]
  base = "warmrobot/web"
  command = "cd .. && npm ci && npm run build -w web"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
